services:
  app:
    build: .
    container_name: control-instalaciones
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    volumes:
      - ./public:/app/public:ro
      - ./views:/app/views:ro
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres-instalaciones
    env_file:
      - .env
    volumes:
      - ${VOL:-./}/control-impl-oc-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-instalaciones}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  loki:
    image: grafana/loki:2.9.0
    container_name: loki-instalaciones
    ports:
      - "3100:3100"
    volumes:
      - ${VOL:-./}/loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
